name: Platform Sandbox Security E2E

permissions:
  contents: read

concurrency:
  group: platform-sandbox-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

jobs:
  linux-bwrap-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          bwrap --version
      - name: Enable unprivileged user namespaces (if restricted by AppArmor)
        run: |
          if sysctl kernel.apparmor_restrict_unprivileged_userns >/dev/null 2>&1; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
      - name: Ensure bwrap is setuid root
        run: sudo chmod 4755 /usr/bin/bwrap
      - name: Install test dependencies
        run: python -m pip install -e '.[test]'
      - name: Capture pre-test diagnostics
        run: |
          set +e
          mkdir -p diagnostics
          {
            echo "=== uname ==="
            uname -a
            echo "=== bwrap version ==="
            bwrap --version
            echo "=== bwrap permissions ==="
            ls -l /usr/bin/bwrap
            echo "=== sysctl userns ==="
            sysctl kernel.unprivileged_userns_clone 2>&1
            sysctl kernel.apparmor_restrict_unprivileged_userns 2>&1
            echo "=== TMPDIR ==="
            echo "TMPDIR=$TMPDIR"
            python3 -c "import tempfile; print('gettempdir:', tempfile.gettempdir())"
            echo "=== bwrap isolation probe (argv_prefix topology) ==="
            tmpdir=$(mktemp -d)
            bwrap --ro-bind / / --dev /dev --proc /proc --tmpfs /tmp --bind "$tmpdir" /tmp/workspace --unshare-net --unshare-pid --unshare-ipc --unshare-uts --new-session --die-with-parent --chdir /tmp/workspace -- /bin/sh -c 'echo probe > .probe && cat .probe' 2>&1
            echo "probe exit: $?"
            rm -rf "$tmpdir"
          } > diagnostics/linux-bwrap-pre.txt
          exit 0
      - name: Run real bwrap isolation E2E
        env:
          KHAOS_REQUIRE_PLATFORM_SANDBOX: "1"
        run: python -m pytest python/tests/coding/test_platform_backends.py -q -k real_bwrap -v
      - name: Capture post-test diagnostics
        if: always()
        run: |
          set +e
          {
            echo "=== residual bwrap processes ==="
            pgrep -af bwrap 2>&1
            echo "=== residual sleep processes ==="
            pgrep -af "sleep 30" 2>&1
            echo "=== done ==="
          } > diagnostics/linux-bwrap-post.txt
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: linux-bwrap-diagnostics
          path: diagnostics/

  macos-sandbox-security:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -e '.[test]'
      - name: Capture pre-test diagnostics
        run: |
          set +e
          mkdir -p diagnostics
          {
            echo "=== uname ==="
            uname -a
            echo "=== sandbox-exec ==="
            which sandbox-exec
            sandbox-exec --version 2>&1
          } > diagnostics/macos-sandbox-pre.txt
          exit 0
      - name: Run real sandbox-exec isolation E2E
        env:
          KHAOS_REQUIRE_PLATFORM_SANDBOX: "1"
        run: python -m pytest python/tests/coding/test_platform_backends.py -q -k real_macos -v
      - name: Capture post-test diagnostics
        if: always()
        run: |
          set +e
          {
            echo "=== residual sandbox-exec processes ==="
            pgrep -af sandbox-exec 2>&1
            echo "=== done ==="
          } > diagnostics/macos-sandbox-post.txt
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: macos-sandbox-diagnostics
          path: diagnostics/

  windows-fail-closed-security:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -e ".[test]"
      - name: Prove Windows has no Host fallback
        run: python -m pytest python/tests/coding/test_windows_fail_closed.py python/tests/coding/test_backend_selector.py -q -m windows_fail_closed -v
      - name: Capture Windows diagnostics
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          Get-ComputerInfo | Out-File diagnostics/windows-platform.txt
          Get-Process | Sort-Object ProcessName | Format-Table -AutoSize | Out-File diagnostics/windows-processes.txt
      - name: Upload Windows diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-fail-closed-diagnostics
          path: diagnostics/
