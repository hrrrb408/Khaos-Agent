name: Platform Sandbox Security E2E

permissions:
  contents: read

concurrency:
  group: platform-sandbox-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feature/**"
      - "codex/**"
  workflow_dispatch:

jobs:
  linux-bwrap-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          bwrap --version
      - name: Enable unprivileged user namespaces (if restricted by AppArmor)
        run: |
          if sysctl kernel.apparmor_restrict_unprivileged_userns >/dev/null 2>&1; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
      - name: Use unprivileged bwrap with bounded tmpfs support
        run: |
          sudo chmod 0755 /usr/bin/bwrap
          test ! -u /usr/bin/bwrap
      - name: Install test dependencies
        run: python -m pip install -e '.[test]'
      - name: Build inner seccomp launcher
        run: cargo build --release --no-default-features --bin khaos-sandbox-launcher --manifest-path rust/khaos-core/Cargo.toml
      - name: Delegate cgroup v2 subtree
        run: |
          test -f /sys/fs/cgroup/cgroup.controllers
          for controller in cpu memory pids io; do
            if grep -qw "$controller" /sys/fs/cgroup/cgroup.controllers; then
              echo "+$controller" | sudo tee /sys/fs/cgroup/cgroup.subtree_control >/dev/null
            fi
          done
          sudo mkdir -p /sys/fs/cgroup/khaos
          # A cgroup v2 controller must be enabled at every non-leaf level.
          # Chown the pseudo-files as well as the directory so the unprivileged
          # test process can create and configure per-execution children.
          sudo chown -R "$(id -u):$(id -g)" /sys/fs/cgroup/khaos
          for controller in cpu memory pids io; do
            if grep -qw "$controller" /sys/fs/cgroup/khaos/cgroup.controllers; then
              echo "+$controller" > /sys/fs/cgroup/khaos/cgroup.subtree_control
            fi
          done
          sudo mkdir -p /sys/fs/cgroup/khaos/runner /sys/fs/cgroup/khaos/workloads
          sudo chown -R "$(id -u):$(id -g)" /sys/fs/cgroup/khaos
          for controller in cpu memory pids io; do
            if grep -qw "$controller" /sys/fs/cgroup/khaos/workloads/cgroup.controllers; then
              echo "+$controller" > /sys/fs/cgroup/khaos/workloads/cgroup.subtree_control
            fi
          done
          test -w /sys/fs/cgroup/khaos
          test -w /sys/fs/cgroup/khaos/cgroup.procs
          test -w /sys/fs/cgroup/khaos/cgroup.subtree_control
          test -w /sys/fs/cgroup/khaos/runner/cgroup.procs
          test -w /sys/fs/cgroup/khaos/workloads/cgroup.procs
      - name: Prepare block-backed sandbox workspace
        run: |
          # GitHub-hosted runners may place /tmp on an overlay/pseudo device.
          # cgroup v2 io.max correctly rejects such a device with ENODEV.
          # Use a real loop-backed ext4 mount so the security job proves the
          # I/O controller instead of weakening production to skip io.max.
          sudo truncate -s 2G /var/tmp/khaos-sandbox-workspace.img
          sudo mkfs.ext4 -F -q /var/tmp/khaos-sandbox-workspace.img
          sudo mkdir -p /mnt/khaos-sandbox-workspace
          sudo mount -o loop,noatime /var/tmp/khaos-sandbox-workspace.img /mnt/khaos-sandbox-workspace
          sudo chown "$(id -u):$(id -g)" /mnt/khaos-sandbox-workspace
          test -w /mnt/khaos-sandbox-workspace
          echo "TMPDIR=/mnt/khaos-sandbox-workspace" >> "$GITHUB_ENV"
      - name: Capture pre-test diagnostics
        run: |
          set +e
          mkdir -p diagnostics
          {
            echo "=== uname ==="
            uname -a
            echo "=== bwrap version ==="
            bwrap --version
            echo "=== bwrap permissions ==="
            ls -l /usr/bin/bwrap
            echo "=== sysctl userns ==="
            sysctl kernel.unprivileged_userns_clone 2>&1
            sysctl kernel.apparmor_restrict_unprivileged_userns 2>&1
            echo "=== TMPDIR ==="
            echo "TMPDIR=$TMPDIR"
            python3 -c "import tempfile; print('gettempdir:', tempfile.gettempdir())"
            echo "=== bwrap isolation probe (argv_prefix topology) ==="
            tmpdir=$(mktemp -d)
            bwrap --ro-bind / / --dev /dev --proc /proc --tmpfs /tmp --bind "$tmpdir" /tmp/workspace --unshare-net --unshare-pid --unshare-ipc --unshare-uts --new-session --die-with-parent --chdir /tmp/workspace -- /bin/sh -c 'echo probe > .probe && cat .probe' 2>&1
            echo "probe exit: $?"
            rm -rf "$tmpdir"
          } > diagnostics/linux-bwrap-pre.txt
          exit 0
      - name: Run real bwrap isolation E2E
        env:
          KHAOS_REQUIRE_PLATFORM_SANDBOX: "1"
          KHAOS_CGROUP_ROOT: /sys/fs/cgroup/khaos/workloads
          KHAOS_SANDBOX_LAUNCHER: ${{ github.workspace }}/rust/khaos-core/target/release/khaos-sandbox-launcher
        run: |
          runner_uid="$(id -u)"
          runner_gid="$(id -g)"
          python_bin="$(command -v python)"
          runner_home="$HOME"
          runner_path="$PATH"
          runner_ld_library_path="${LD_LIBRARY_PATH:-}"
          launcher="$KHAOS_SANDBOX_LAUNCHER"
          sudo bash -c '
            echo "$$" > /sys/fs/cgroup/khaos/runner/cgroup.procs
            exec setpriv --reuid="$1" --regid="$2" --init-groups \
              env HOME="$4" PATH="$5" LD_LIBRARY_PATH="$7" \
              TMPDIR=/mnt/khaos-sandbox-workspace \
              KHAOS_REQUIRE_PLATFORM_SANDBOX=1 \
              KHAOS_CGROUP_ROOT=/sys/fs/cgroup/khaos/workloads \
              KHAOS_SANDBOX_LAUNCHER="$6" \
              "$3" -m pytest python/tests/coding/test_platform_backends.py \
              -q -k real_bwrap -v
          ' bash "$runner_uid" "$runner_gid" "$python_bin" \
            "$runner_home" "$runner_path" "$launcher" "$runner_ld_library_path"
      - name: Capture post-test diagnostics
        if: always()
        run: |
          set +e
          {
            echo "=== residual bwrap processes ==="
            pgrep -af bwrap 2>&1
            echo "=== residual sleep processes ==="
            pgrep -af "sleep 30" 2>&1
            echo "=== done ==="
          } > diagnostics/linux-bwrap-post.txt
          exit 0
      - name: Remove block-backed sandbox workspace
        if: always()
        run: |
          sudo umount /mnt/khaos-sandbox-workspace || true
          sudo rm -f /var/tmp/khaos-sandbox-workspace.img
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: linux-bwrap-diagnostics
          path: diagnostics/

  macos-sandbox-security:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -e '.[test]'
      - name: Capture pre-test diagnostics
        run: |
          set +e
          mkdir -p diagnostics
          {
            echo "=== uname ==="
            uname -a
            echo "=== sandbox-exec ==="
            which sandbox-exec
            sandbox-exec --version 2>&1
          } > diagnostics/macos-sandbox-pre.txt
          exit 0
      - name: Run real sandbox-exec isolation E2E
        env:
          KHAOS_REQUIRE_PLATFORM_SANDBOX: "1"
        run: python -m pytest python/tests/coding/test_platform_backends.py -q -k real_macos -v
      - name: Capture post-test diagnostics
        if: always()
        run: |
          set +e
          {
            echo "=== residual sandbox-exec processes ==="
            pgrep -af sandbox-exec 2>&1
            echo "=== done ==="
          } > diagnostics/macos-sandbox-post.txt
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-sandbox-diagnostics
          path: diagnostics/

  windows-fail-closed-security:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -e ".[test]"
      - name: Prove Windows has no Host fallback
        run: python -m pytest python/tests/coding/test_windows_fail_closed.py python/tests/coding/test_backend_selector.py -q -m windows_fail_closed -v
      - name: Capture Windows diagnostics
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          Get-ComputerInfo | Out-File diagnostics/windows-platform.txt
          Get-Process | Sort-Object ProcessName | Format-Table -AutoSize | Out-File diagnostics/windows-processes.txt
      - name: Upload Windows diagnostics
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: windows-fail-closed-diagnostics
          path: diagnostics/
