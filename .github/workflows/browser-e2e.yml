name: Browser Security E2E

permissions:
  contents: read

concurrency:
  group: browser-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feature/**"
      - "codex/**"
  workflow_dispatch:

jobs:
  playwright-security:
    # M2: real Playwright + Chromium E2E for the browser security layer.
    # Mirrors the structure of docker-security.yml: dedicated workflow,
    # env-var gate (``KHAOS_RUN_BROWSER_E2E=1``), pytest marker filter
    # (``-m browser_real``), and a single OS to keep CI minutes in
    # check.  The mock-only tests in test_browser_tools.py still run in
    # security-contract-matrix.yml on the full OS matrix, so this job
    # only adds the *real* browser layer.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install test + browser dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test,browser]'
      - name: Download Chromium binary
        # M2: the ``browser`` extra installs the Python package, but
        # the actual browser binary must be downloaded separately.
        run: python -m playwright install --with-deps chromium
      - name: Run real Playwright security E2E
        env:
          KHAOS_RUN_BROWSER_E2E: "1"
        run: python -m pytest python/tests/tools/test_browser_tools_e2e.py -q -m browser_real -v
