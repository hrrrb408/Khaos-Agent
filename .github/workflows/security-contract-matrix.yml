name: Security Contract Matrix

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feature/**", "codex/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-14]
    steps:
      - name: Checkout pinned action
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Python pinned action
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Set up Go pinned action
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.24.x"
          cache-dependency-path: go/go.mod
      - name: Install contract dependencies
        run: python -m pip install -e ".[test,tui]"
      - name: Run cross-platform security contracts
        run: python -m pytest python/tests/security/test_ci_security_policy.py python/tests/security/test_middleware.py python/tests/security/test_sandbox.py python/tests/agent/test_approval_broker.py python/tests/agent/test_operation_approval_ledger.py python/tests/agent/test_turn_coordinator.py python/tests/permissions/test_permission_engine.py python/tests/tools/test_capability_broker.py python/tests/tools/test_tool_scheduler.py python/tests/coding/test_backend_selector.py python/tests/coding/test_permission_profile.py python/tests/coding/test_windows_fail_closed.py python/tests/tui/test_view_model.py python/tests/tui/test_tui_app.py -q
      - name: Run durable webhook and resource contracts
        run: python -m pytest python/tests/channels/test_webhook.py python/tests/channels/test_channel_registry.py python/tests/coding/test_process_supervisor.py python/tests/coding/test_workspace_storage.py python/tests/coding/test_workspace_storage_authority.py python/tests/coding/test_managed_process_lifecycle.py -q
      - name: Run POSIX verification authority contracts
        if: runner.os != 'Windows'
        run: python -m pytest python/tests/coding/test_m4_batch3_1_6_2_authority.py -q
      - name: Run POSIX RPC peer-identity contracts
        if: runner.os != 'Windows'
        run: python -m pytest python/tests/test_grpc_server.py -q
      - name: Run POSIX workspace boundary contracts
        if: runner.os != 'Windows'
        run: python -m pytest python/tests/coding/test_safe_workspace_fs.py python/tests/coding/test_workspace_boundary.py python/tests/coding/test_workspace_manager.py python/tests/coding/test_execution_binding.py python/tests/coding/test_m4_batch3_0_workspace_mutation.py python/tests/tools/test_office_workspace_fs_security.py -q
      - name: Run Go gateway tests
        working-directory: go
        run: go test ./...
      - name: Run Rust core tests
        working-directory: rust/khaos-core
        run: cargo test --locked
