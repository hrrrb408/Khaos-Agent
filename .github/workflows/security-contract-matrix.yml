name: Security Contract Matrix

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feature/**", "codex/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-14]
    steps:
      - name: Checkout pinned action
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Python pinned action
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install contract dependencies
        run: python -m pip install -e ".[test,tui]"
      - name: Run cross-platform security contracts
        run: python -m pytest python/tests/security/test_ci_security_policy.py python/tests/agent/test_approval_broker.py python/tests/agent/test_operation_approval_ledger.py python/tests/agent/test_turn_coordinator.py python/tests/permissions/test_permission_engine.py python/tests/tools/test_tool_scheduler.py python/tests/coding/test_backend_selector.py python/tests/coding/test_permission_profile.py python/tests/coding/test_windows_fail_closed.py python/tests/tui/test_view_model.py python/tests/tui/test_tui_app.py -q
      - name: Run POSIX workspace boundary contracts
        if: runner.os != 'Windows'
        run: python -m pytest python/tests/coding/test_safe_workspace_fs.py python/tests/coding/test_workspace_boundary.py -q
      - name: Run Go gateway tests
        working-directory: go
        run: go test ./...
      - name: Run Rust core tests
        working-directory: rust/khaos-core
        run: cargo test --locked
