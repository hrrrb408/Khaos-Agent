name: Docker Security E2E

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

jobs:
  docker-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -e '.[test]'
      - name: Preload allowlisted image
        run: docker pull python@sha256:eb43ff125d8d58d7449dcba7d336c23bcac412f526d861db493b9994d8010280
      - name: Run real Docker isolation E2E
        run: python -m pytest python/tests/tools/test_sandbox_tools.py -q -k real_docker_workspace_isolation_e2e
