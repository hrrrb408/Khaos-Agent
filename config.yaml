database:
  path: khaos.db

models:
  providers:
    nvidia:
      type: openai_compatible
      base_url: "https://integrate.api.nvidia.com/v1"
      api_key: "${NVIDIA_API_KEY}"
      timeout: 120
      models:
        - name: "qwen/qwen3.5-122b-a10b"
          max_context_tokens: 131072
          max_output_tokens: 4096
          supports_tools: true
          supports_vision: false
    # Anthropic Claude (Messages API). Uncomment and set ANTHROPIC_API_KEY to enable.
    anthropic:
      type: anthropic
      base_url: "https://api.anthropic.com"
      api_key: "${ANTHROPIC_API_KEY}"
      timeout: 120
      models:
        - name: "claude-sonnet-4-20250514"
          max_context_tokens: 200000
          max_output_tokens: 4096
          supports_tools: true
          supports_vision: true
    # Native OpenAI (wire-compatible with the OpenAI-compatible provider).
    openai:
      type: openai
      base_url: "https://api.openai.com/v1"
      api_key: "${OPENAI_API_KEY}"
      timeout: 120
      models:
        - name: "gpt-4o"
          max_context_tokens: 128000
          max_output_tokens: 4096
          supports_tools: true
          supports_vision: true
  default_model: "qwen/qwen3.5-122b-a10b"
  router:
    type: single
  moa:
    enabled: false
    pipelines:
      - name: "draft+review"
        proposers: ["qwen/qwen3-8b"]
        aggregator: "qwen/qwen3-8b"
        rounds: 1

defaults:
  mode: office
  stream_timeout: 120
  compression_threshold: 128000

gateway:
  api_key: "${KHAOS_API_KEY}"
  python_agent: "127.0.0.1:50051"
  listen: "127.0.0.1:8080"

web:
  port: 3000
