database:
  path: khaos.db

models:
  providers:
    nvidia:
      type: openai_compatible
      base_url: "https://integrate.api.nvidia.com/v1"
      api_key: "${NVIDIA_API_KEY}"
      timeout: 120
      models:
        - name: "qwen/qwen3.5-122b-a10b"
          max_context_tokens: 131072
          max_output_tokens: 4096
          supports_tools: true
          supports_vision: false
    # Anthropic Claude (Messages API). Uncomment and set ANTHROPIC_API_KEY to enable.
    anthropic:
      type: anthropic
      base_url: "https://api.anthropic.com"
      api_key: "${ANTHROPIC_API_KEY}"
      timeout: 120
      models:
        - name: "claude-sonnet-4-20250514"
          max_context_tokens: 200000
          max_output_tokens: 4096
          supports_tools: true
          supports_vision: true
    # Native OpenAI (wire-compatible with the OpenAI-compatible provider).
    openai:
      type: openai
      base_url: "https://api.openai.com/v1"
      api_key: "${OPENAI_API_KEY}"
      timeout: 120
      models:
        - name: "gpt-4o"
          max_context_tokens: 128000
          max_output_tokens: 4096
          supports_tools: true
          supports_vision: true
  default_model: "qwen/qwen3.5-122b-a10b"
  router:
    type: single
  moa:
    enabled: false
    pipelines:
      - name: "draft+review"
        proposers: ["qwen/qwen3-8b"]
        aggregator: "qwen/qwen3-8b"
        rounds: 1

defaults:
  mode: office
  stream_timeout: 120
  compression_threshold: 128000

gateway:
  host: "127.0.0.1"
  port: 8080
  api_key: "${KHAOS_API_KEY}"
  # Empty KHAOS_API_KEY causes the Go gateway to create a protected 256-bit
  # token in the user config directory; browsers must enter that token.
  api_key_file: ""
  cors_origins: []
  allowed_hosts: ["127.0.0.1", "localhost", "::1"]
  python_agent: "/tmp/khaos-agent.sock"
  listen: "127.0.0.1:8080"

web:
  port: 3000

# Khaos runtime defaults
model:
  default_provider: "openai"
  default_model: "gpt-4"
  max_tokens: 4096
  temperature: 0.7

agent:
  socket: "/tmp/khaos-agent.sock"

security:
  enabled: true
  block_dangerous_commands: true
  confirm_risky_commands: true

# Coding runtime alignment defaults. Optional adapters degrade safely when
# Tree-sitter/LSP or a stronger execution backend is unavailable.
coding:
  intelligence:
    enabled: true
    languages: [python, javascript, typescript, go, rust]
    incremental: true
    tree_sitter: {enabled: auto}
    lsp: {enabled: auto, request_timeout_seconds: 10, restart_limit: 1}
    # Optional LSP evidence fusion (Batch 6). DEFAULT OFF — when disabled,
    # the fusion service returns repository-only results and never sends
    # an LSP request. Callers cannot toggle this per-tool-call.
    lsp_evidence_fusion:
      enabled: false
      request_timeout_seconds: 10.0
      restart_limit: 1
      cache_max_entries: 2048
      cache_ttl_seconds: 300.0
      cache_max_bytes: 16777216
      trusted_servers: []
  workspace:
    mode: worktree
    require_clean_base: true
    default_output: commit-in-worktree
  verification:
    enabled: true
    max_fix_attempts: 3
    run_affected_first: true
    run_full_before_delivery: true

execution:
  backend: auto
  network_policy: none
  writable_roots: workspace
  environment_allowlist: [PATH, HOME, LANG, LC_ALL, TMPDIR]

mode:
  default: "office"

memory:
  budget_max: 100
  auto_extract: true

subagents:
  enabled: false
  max_spawn: 3
  max_depth: 2
