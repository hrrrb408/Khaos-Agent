database:
  path: khaos.db

models:
  providers:
    nvidia:
      type: openai_compatible
      base_url: "https://integrate.api.nvidia.com/v1"
      api_key: "${NVIDIA_API_KEY}"
      timeout: 120
      models:
        - name: "qwen/qwen3-8b"
          max_context_tokens: 32768
          supports_tools: true
          supports_vision: false
  default_model: "qwen/qwen3-8b"
  router:
    type: single
  moa:
    enabled: false
    pipelines:
      - name: "draft+review"
        proposers: ["qwen/qwen3-8b"]
        aggregator: "qwen/qwen3-8b"
        rounds: 1

defaults:
  mode: office
  stream_timeout: 120
  compression_threshold: 128000

gateway:
  api_key: "${KHAOS_API_KEY}"
  python_agent: "127.0.0.1:50051"
  listen: "127.0.0.1:8080"

web:
  port: 3000
