version: "3.8"

services:
  khaos-agent:
    build:
      context: .
      target: python-agent
    container_name: khaos-agent
    volumes:
      - khaos-data:/app/data
      - khaos-runtime:/run/khaos
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - KHAOS_MODE=office
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(socket.AF_UNIX); s.connect('/run/khaos/agent.sock'); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3

  khaos-gateway:
    build:
      context: .
      target: gateway
    container_name: khaos-gateway
    ports:
      - "8080:8080"
    depends_on:
      khaos-agent:
        condition: service_healthy
    environment:
      - KHAOS_PYTHON_AGENT=/run/khaos/agent.sock
      - KHAOS_API_KEY=${KHAOS_API_KEY:-}
    volumes:
      - khaos-runtime:/run/khaos
    restart: unless-stopped

volumes:
  khaos-data:
  khaos-runtime:
